spring:
  application:
    name: sifap-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sifap}
    username: ${DB_USER:sifap}
    password: ${DB_PASSWORD:sifap}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
      cors:
        allowed-origins: ${SIFAP_CORS_ALLOWED_ORIGINS:http://localhost:3001,http://127.0.0.1:3001}
        allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080

logging:
  level:
    br.gov.serpro.sifap: INFO
