name: CI

on:
  push:
    branches: [main, develop, "spec/**", "impl/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Detect changed paths ────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra:    ${{ steps.filter.outputs.infra }}
      specs:    ${{ steps.filter.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'prototype/backend/**'
            frontend:
              - 'prototype/frontend/**'
            infra:
              - 'infra/**'
              - '**/*.tf'
            specs:
              - 'specs/**'
              - 'scripts/validate-traceability.py'

# ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Java 21 + Spring Boot 3.3)
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: prototype/backend/target/site/jacoco/

# ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js 15 + TypeScript)
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('prototype/frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test:run

# ─── Infra (Terraform) ───────────────────────────────────────────────────────
  infra:
    name: Infra (Terraform validate + plan)
    needs: detect-changes
    if: needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (sem backend remoto)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

      - name: Plan (mock — sem credenciais Azure em PRs)
        if: github.event_name == 'pull_request'
        env:
          TF_VAR_jwt_secret: "ci-mock-secret-min-32-chars-long!!"
        run: |
          echo "Terraform plan requer credenciais Azure — validação estrutural OK."
          terraform validate && echo "✅ terraform validate passed"

# ─── Spec traceability ───────────────────────────────────────────────────────
  traceability:
    name: Spec traceability (ADR-003)
    needs: detect-changes
    if: needs.detect-changes.outputs.specs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate source_legacy
        run: python3 scripts/validate-traceability.py

      - name: Summary on failure
        if: failure()
        run: |
          echo "## ❌ Falha de rastreabilidade" >> $GITHUB_STEP_SUMMARY
          echo "Cada REQ-ID precisa de \`source_legacy:\` apontando para \`01-arqueologia/legado-sifap/\` ou \`[GREENFIELD] <justificativa>\`." >> $GITHUB_STEP_SUMMARY
          echo "Ver [ADR-003](../blob/main/02-spec-moderna/ADR-003-source-legacy-ci-enforcement.md)." >> $GITHUB_STEP_SUMMARY
